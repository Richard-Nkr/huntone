_format_version: "3.0"

services:
  # ── Auth ──────────────────────────────────────────────────────────────────
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1
        strip_path: true
        paths:
          - /auth/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Api-Version
            - X-CSRF-Token
            - X-Requested-With
            - X-Upsert
            - Authorization
            - apikey
          exposed_headers:
            - X-JWT
            - Content-Range
          max_age: 3600
          credentials: true

  # ── REST API ──────────────────────────────────────────────────────────────
  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1
        strip_path: true
        paths:
          - /rest/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Api-Version
            - X-CSRF-Token
            - X-Requested-With
            - X-Upsert
            - Authorization
            - apikey
            - Prefer
            - prefer
          exposed_headers:
            - Content-Range
            - X-Total-Count
            - Range-Unit
          max_age: 3600
          credentials: true

  # ── Storage ───────────────────────────────────────────────────────────────
  - name: storage-v1
    url: http://storage:5000
    routes:
      - name: storage-v1
        strip_path: true
        paths:
          - /storage/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Api-Version
            - X-CSRF-Token
            - X-Requested-With
            - X-Upsert
            - Authorization
            - apikey
            - x-upsert
          exposed_headers:
            - Content-Range
          max_age: 3600
          credentials: true

  # ── Realtime ──────────────────────────────────────────────────────────────
  - name: realtime-v1
    url: http://realtime:4000
    routes:
      - name: realtime-v1
        strip_path: true
        paths:
          - /realtime/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Api-Version
            - X-CSRF-Token
            - X-Requested-With
            - X-Upsert
            - Authorization
            - apikey
            - Sec-WebSocket-Key
            - Sec-WebSocket-Protocol
            - Sec-WebSocket-Version
            - Upgrade
            - Connection
          exposed_headers:
            - Sec-WebSocket-Accept
          max_age: 3600
          credentials: true

  # ── PG Meta (Studio) ──────────────────────────────────────────────────────
  - name: meta
    url: http://kong:8000/pg
    routes:
      - name: meta
        strip_path: true
        paths:
          - /pg
